<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد إضافة مشروع جديد - Windows XP</title>
    <style>
        :root {
            --win-bg: #ece9d8;
            --win-blue-dark: #0054e3;
            --win-blue-light: #2788f5;
            --win-btn-green: linear-gradient(to bottom, #3c933c 0%, #2f7e2f 100%);
            --win-btn-green-hover: linear-gradient(to bottom, #4caf50 0%, #388e3c 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Tahoma", "Segoe UI", Arial, sans-serif;
        }

        body {
            background-color: #5a7edc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Classic XP Window styling */
        .window {
            background-color: var(--win-bg);
            border: 3px solid var(--win-blue-dark);
            border-radius: 7px 7px 0 0;
            width: 100%;
            max-width: 650px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Title Bar */
        .title-bar {
            background: linear-gradient(to right, #0058e6 0%, #3a93ff 100%);
            height: 30px;
            padding: 4px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 13px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
            border-radius: 4px 4px 0 0;
        }

        .title-bar-text {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Main Form Area */
        .window-body {
            padding: 20px;
            background-color: #ffffff;
            border: 2px inset #ffffff;
            margin: 4px;
            flex-grow: 1;
        }

        .wizard-header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #0054e3;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .wizard-logo {
            font-size: 40px;
        }

        .wizard-title h2 {
            font-size: 18px;
            color: #003399;
        }

        .wizard-title p {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 12px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 6px;
            font-size: 12px;
            border: 1px solid #7f9db9;
            border-radius: 2px;
            outline: none;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: #0054e3;
            box-shadow: 0 0 3px rgba(0, 84, 227, 0.4);
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        /* Nested Files Section */
        .files-section {
            border: 1px dashed #a0a090;
            background-color: #fcfcf9;
            padding: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .files-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .files-section-title {
            font-size: 13px;
            font-weight: bold;
            color: #003399;
        }

        .file-entry {
            background-color: #f1ebd9;
            border: 1px solid #c0c0b0;
            padding: 10px;
            border-radius: 3px;
            margin-bottom: 10px;
            position: relative;
        }

        .file-entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .btn-remove-file {
            background: none;
            border: none;
            color: #d32f2f;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }

        .btn-remove-file:hover {
            text-decoration: underline;
        }

        /* Buttons styling */
        .window-footer {
            background-color: var(--win-bg);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #d0d0c0;
        }

        .footer-links a {
            font-size: 11px;
            color: #215dc6;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        .btn-xp {
            padding: 5px 15px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #003c74;
            border-radius: 3px;
            cursor: pointer;
            outline: none;
            box-shadow: inset 1px 1px 1px rgba(255, 255, 255, 0.4);
        }

        .btn-primary {
            background: var(--win-btn-green);
            color: #ffffff;
            border-color: #2e7d32;
        }

        .btn-primary:hover {
            background: var(--win-btn-green-hover);
        }

        .btn-secondary {
            background: linear-gradient(to bottom, #ffffff 0%, #dcdad4 100%);
            color: #333333;
            border-color: #707070;
        }

        .btn-secondary:hover {
            background: linear-gradient(to bottom, #ffffff 0%, #e2e0da 100%);
        }

        /* Alert styling */
        .xp-alert {
            display: none;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
        }

        .xp-alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .xp-alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">📂 مساعد إعداد وإضافة مستند للموقع</div>
            <div style="font-size: 10px; opacity: 0.8;">معالج التثبيت</div>
        </div>

        <div class="window-body">
            <div class="wizard-header">
                <span class="wizard-logo">🧙‍♂️</span>
                <div class="wizard-title">
                    <h2>معالج إضافة مجلد جديد إلى "مستنداتي"</h2>
                    <p>قم بتعبئة النموذج بالأسفل لإدراج مجلد مشاريع جديد مع خيار إدراج مستندات فرعية بداخله.</p>
                </div>
            </div>

            <!-- Alerts -->
            <div id="alert-box" class="xp-alert"></div>

            <form id="project-form">
                <div class="form-group">
                    <label for="proj-id">رمز التعريف للمشروع (باللغة الإنجليزية ودون مسافات):</label>
                    <input type="text" id="proj-id" placeholder="مثال: myportfolio, chat_app" required pattern="^[a-zA-Z0-9_\-]+$">
                </div>

                <div class="form-group">
                    <label for="proj-title">اسم المشروع / المجلد (باللغة العربية):</label>
                    <input type="text" id="proj-title" placeholder="مثال: موقع أعمالي الشخصي" required>
                </div>

                <div class="form-group">
                    <label for="proj-icon">أيقونة المجلد (إيموجي):</label>
                    <select id="proj-icon">
                        <option value="📁">📁 مجلد كلاسيكي</option>
                        <option value="📂">📂 مجلد مفتوح</option>
                        <option value="🎮">🎮 ألعاب وترفيه</option>
                        <option value="🌐">🌐 موقع ويب</option>
                        <option value="💻">💻 تطبيق حاسوب</option>
                        <option value="📄">📄 مستند نصي</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="proj-desc">وصف المشروع بالتفصيل:</label>
                    <textarea id="proj-desc" placeholder="اكتب ملخصاً يعبر عن أهداف هذا المشروع والمهام المنجزة فيه..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="proj-tech">التقنيات المستخدمة (مفصولة بفاصلة):</label>
                    <input type="text" id="proj-tech" placeholder="مثال: React, Python, FastAPI" required>
                </div>

                <!-- Nested sub-files wrapper -->
                <div class="files-section">
                    <div class="files-section-header">
                        <span class="files-section-title">📄 مستندات فرعية داخل المجلد (اختياري)</span>
                        <button type="button" class="btn-xp btn-secondary" onclick="addFileField()" style="font-size: 10px; padding: 2px 6px;">+ إضافة ملف نصي فرعي</button>
                    </div>
                    <div id="files-container">
                        <!-- Dynamic file entry inputs will be injected here -->
                    </div>
                </div>
            </form>
        </div>

        <div class="window-footer">
            <div class="footer-links">
                <a href="index.html">◀ العودة إلى سطح المكتب</a>
            </div>
            <div class="button-group">
                <button type="button" class="btn-xp btn-secondary" onclick="resetForm()">إلغاء الأمر</button>
                <button type="button" class="btn-xp btn-primary" onclick="submitProject()">التالي (حفظ) ◀</button>
            </div>
        </div>
    </div>

    <script src="projects-data.js"></script>
    <script>
        // التحقق من تحميل الملف أو تهيئة مصفوفة فارغة
        if (typeof PROJECTS_DATA === 'undefined') {
            var PROJECTS_DATA = [];
        }
        let fileIndex = 0;

        function addFileField() {
            fileIndex++;
            const container = document.getElementById('files-container');
            const fileEntry = document.createElement('div');
            fileEntry.className = 'file-entry';
            fileEntry.id = `file-entry-${fileIndex}`;
            
            fileEntry.innerHTML = `
                <div class="file-entry-header">
                    <label>ملف فرعي #${fileIndex}</label>
                    <button type="button" class="btn-remove-file" onclick="removeFileField(${fileIndex})">إزالة ✕</button>
                </div>
                <div class="form-group" style="margin-bottom: 8px;">
                    <label>نوع الملف:</label>
                    <select class="sub-file-type" onchange="toggleFileContentInput(${fileIndex}, this.value)">
                        <option value="txt">📄 مستند نصي (.txt)</option>
                        <option value="img">🖼️ صورة (.png, .jpg, .gif)</option>
                        <option value="audio">🎵 ملف صوتي (.mp3, .wav)</option>
                        <option value="lnk">🔗 رابط موقع خارجي (.lnk)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 8px;">
                    <label>اسم الملف (دون كتابة الامتداد):</label>
                    <input type="text" class="sub-file-name" placeholder="مثال: روابط_الموقع" required>
                </div>
                <div class="form-group" id="file-content-group-${fileIndex}" style="margin-bottom: 0;">
                    <label id="file-content-label-${fileIndex}">محتويات الملف النصي:</label>
                    <textarea class="sub-file-content" placeholder="اكتب نصوصاً أو روابط هنا..." required></textarea>
                </div>
            `;
            container.appendChild(fileEntry);
        }

        function toggleFileContentInput(index, value) {
            const inputContainer = document.getElementById(`file-content-group-${index}`);
            
            if (value === 'txt') {
                inputContainer.innerHTML = `
                    <label id="file-content-label-${index}">محتويات الملف النصي:</label>
                    <textarea class="sub-file-content" placeholder="اكتب نصوصاً أو روابط هنا..." required></textarea>
                `;
            } else {
                let placeholderText = "رابط الصورة المباشر (مثل: https://picsum.photos/400/300)";
                let labelText = "رابط الصورة (URL):";
                if (value === 'audio') {
                    placeholderText = "رابط الملف الصوتي المباشر (مثل: https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3)";
                    labelText = "رابط الملف الصوتي (URL):";
                } else if (value === 'lnk') {
                    placeholderText = "رابط الموقع الإلكتروني (مثل: https://github.com/developer-amjad)";
                    labelText = "رابط الموقع (URL):";
                }
                
                inputContainer.innerHTML = `
                    <label id="file-content-label-${index}">${labelText}</label>
                    <input type="text" class="sub-file-content" placeholder="${placeholderText}" required style="width: 100%; padding: 6px; font-size: 12px; border: 1px solid #7f9db9; border-radius: 2px; outline: none;">
                `;
            }
        }

        function removeFileField(index) {
            const entry = document.getElementById(`file-entry-${index}`);
            if (entry) entry.remove();
        }

        function resetForm() {
            document.getElementById('project-form').reset();
            document.getElementById('files-container').innerHTML = '';
            hideAlert();
        }

        function showAlert(msg, type) {
            const alertBox = document.getElementById('alert-box');
            alertBox.textContent = msg;
            alertBox.className = `xp-alert xp-alert-${type}`;
            alertBox.style.display = 'block';
            
            // Scroll to alert
            alertBox.scrollIntoView({ behavior: 'smooth' });
        }

        function hideAlert() {
            document.getElementById('alert-box').style.display = 'none';
        }

        async function submitProject() {
            const form = document.getElementById('project-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const id = document.getElementById('proj-id').value.trim();
            const title = document.getElementById('proj-title').value.trim();
            const icon = document.getElementById('proj-icon').value;
            const description = document.getElementById('proj-desc').value.trim();
            const technologies = document.getElementById('proj-tech').value.trim();

            // Collect nested files
            const files = [];
            const fileEntries = document.querySelectorAll('.file-entry');
            let filesValid = true;

            fileEntries.forEach(entry => {
                const nameInput = entry.querySelector('.sub-file-name');
                const contentInput = entry.querySelector('.sub-file-content');
                const typeSelect = entry.querySelector('.sub-file-type');
                
                let name = nameInput.value.trim();
                const content = contentInput.value.trim();
                const type = typeSelect.value;
                
                if (!name || !content) {
                    filesValid = false;
                    nameInput.reportValidity();
                    contentInput.reportValidity();
                    return;
                }
                
                // Automatically append correct extension based on type if not written by the user
                const extensions = { txt: '.txt', img: '.png', audio: '.mp3', lnk: '.lnk' };
                const requiredExt = extensions[type];
                
                // Remove existing extensions to prevent duplicates
                Object.values(extensions).forEach(ext => {
                    if (name.toLowerCase().endsWith(ext)) {
                        name = name.substring(0, name.length - ext.length);
                    }
                });
                
                name += requiredExt;
                
                files.push({ name, content });
            });

            if (!filesValid) return;

            try {
                // 1. Validate unique ID
                const exists = PROJECTS_DATA.some(p => p.id === id);
                if (exists) {
                    showAlert(`خطأ: معرّف المشروع "${id}" مستخدم بالفعل، يرجى كتابة رمز تعريف آخر.`, 'danger');
                    return;
                }

                // 2. Construct new project object
                const newProject = {
                    id,
                    title,
                    icon,
                    description,
                    technologies,
                    files
                };

                // 3. Append to loaded projects data
                PROJECTS_DATA.push(newProject);

                // 4. Format projects data file contents
                const fileContent = `// قائمة مشاريع مستنداتي (My Documents Projects)
// يمكنك تعديل المشاريع القائمة، حذفها، أو إضافة مشاريع جديدة هنا بسهولة!
// سيقوم الموقع بتحديث العناصر تلقائياً بناءً على هذه البيانات.

const PROJECTS_DATA = ${JSON.stringify(PROJECTS_DATA, null, 4)};
`;

                // 5. Trigger browser file download of projects-data.js
                const blob = new Blob([fileContent], { type: "application/javascript;charset=utf-8" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "projects-data.js";
                link.click();

                showAlert('تهانينا! تمت إضافة المجلد الجديد مع ملفاته وتوليد ملف التحديث بنجاح! يرجى نقل ملف "projects-data.js" الذي تم تنزيله الآن واستبداله بالملف القديم في مجلد موقعك لتحديث المعرض.', 'success');
                
                // Reset form after a small delay
                setTimeout(resetForm, 2500);
            } catch (err) {
                showAlert(`حدث خطأ أثناء حفظ الملف: ${err.message}`, 'danger');
            }
        }
    </script>
</body>
</html>
